<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Itim&family=Natasha:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;600&family=Inter:wght@400;500;600&family=Itim&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/natasha" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="styles/registration.css">
</head>
<body>
     <header class="header py-2 sticky-top bg-white mb-0 p-3">
        <div class="container-fluid px-0">
            <div class="d-flex align-items-center">
                <!-- Меню -->
                <button class="btn-h p-0 me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu">
                    <svg width="30" height="30" viewBox="0 0 30 30">
                        <path d="M5,9 H25 M5,15 H25 M5,21 H25"
                              stroke="#000"
                              stroke-width="2"
                              stroke-linecap="round" />
                    </svg>
                </button>

                <!-- Логотип -->
                <div class="logo me-3">
                    <img src="static/Logo.jpg" alt="Logo" width="65" height="42" onclick="location.href='index.html'">
                </div>

        <!-- Выезжающее меню -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu">
            <div class="offcanvas-header">
                <h5 class="offcanvas-title">Меню</h5>
                <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
            </div>
            <div class="offcanvas-body">
                <button class="btn-h w-100 mb-2 login-btn catalog" onclick="location.href='index.html'">Главная страница</button>
                <button class="btn-h w-100 mb-2 login-btn catalog" onclick="location.href='search.html'">Проекты</button>
                <button class="btn-h w-100 mb-2 login-btn catalog" class="scroll-btn" onclick="scrollToBottom()">О нас</button>
                <button class="btn-h w-100 mb-2 login-btn catalog" class="scroll-btn" onclick="scrollToBottom()">Помощь</button>
                <br><br>
                <button class="btn-h w-100 mb-2 login-btn catalog" onclick="location.href='prof_organ.html'">Войти</button>    
                <button class="btn-h w-100 mb-2 login-btn catalog" onclick="location.href='registration.html'">Зарегистрироваться</button>    
            </div>
        </div>
    </header>


    <main class="main">
        <h1 class="title">РЕГИСТРАЦИЯ</h1>
        <div class="buttons">
            <button class="btn btn-white">Организация</button>
            <button class="btn btn-green">инвестор</button>
        </div>

        <form class="form-container">
            <label class="form-label">Краткое название организации</label>
            <input type="text" placeholder="Название" class="input-field">

            <label class="form-label">Юридический адрес</label>
            <input type="text" placeholder="Адрес" class="input-field">

            <label class="form-label">Категория</label>
            <select class="input-field" required>
              <option value="" disabled selected>Выберите категорию</option>
              <option value="category1">Категория 1</option>
              <option value="category2">Категория 2</option>
              <option value="category3">Категория 3</option>
              <option value="category4">Категория 4</option>
            </select>

            <label class="form-label">ФИО руководителя/контактного лица</label>
            <input type="text" placeholder="ФИО" class="input-field">

            <label class="form-label">Телефон руководителя/контактного лица</label>
            <input type="tel" placeholder="Номер телефона" class="input-field">

            <label class="form-label">Электронная почта</label>
            <input type="email" placeholder="Почта" class="input-field">

            <label class="form-label">Пароль</label>
            <input type="password" placeholder="Пароль" class="input-field">

            <label class="form-label">Повторите пароль</label>
            <input type="password" placeholder="Пароль" class="input-field">

            <button type="submit" class="btn-submit">зарегистрироваться</button>
        </form>
    </main>

      <footer>
      <div class="contacts">
          <h3>Контакты</h3>
          <div class="contact-item">
              <span>✉</span>
              <span>dobra.hol@example.com</span>
          </div>
          <div class="contact-item">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20.487 17.14L18.387 15.79C17.447 15.15 16.217 15.41 15.587 16.34L14.517 17.95C12.997 17.35 9.66705 14.33 9.03705 12.81L10.647 11.75C11.587 11.12 11.847 9.89 11.207 8.95L9.85705 6.85C9.21705 5.91 7.98705 5.66 7.05705 6.29L4.50705 8.09C3.57705 8.72 3.32705 9.96 3.96705 10.89L5.72705 13.9C7.96705 18.22 11.647 21.43 16.187 22.71C16.967 22.93 17.787 22.71 18.337 22.11L20.337 19.91C21.107 19.03 20.997 17.67 20.487 17.14Z" fill="currentColor"/>
              </svg>
              <span>+7 (808) 555-0111</span>
          </div>
      </div>
      <div class="help-section">
          <br>
          <div class="help-title">Помощь?</div>
          <div>+7 (808) 555-0111</div>
      </div>
  </footer>
  <script src="scripts/registrationScripts.js"></script>
  
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
